
upstream orbital_mechanics_app { server 127.0.0.1:5820; }
upstream orbital_mechanics_api { server 127.0.0.1:5821; }
upstream orbital_mechanics_ai_proxy { server 127.0.0.1:5050; }

server {
    server_name orbital-mechanics.akylabo.com;
    access_log /var/log/nginx/orbital-mechanics_access.log;
    error_log /var/log/nginx/orbital-mechanics_error.log;

    location /api/chat {
        proxy_pass http://orbital_mechanics_ai_proxy;
        include /home/masuda/Documents/common/shared/nginx/ai-chat.conf;
    }
    # Flight Recorder API
    location /api/simulate {
        proxy_pass http://orbital_mechanics_api;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
        proxy_read_timeout 120s;
    }
    location /api/flight-log {
        proxy_pass http://orbital_mechanics_api;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
    }
    location /api/flight-logs {
        proxy_pass http://orbital_mechanics_api;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
    }
    location = /version.json {
        proxy_pass http://orbital_mechanics_app;
        include /home/masuda/Documents/common/shared/nginx/version-json-cors.conf;
    }
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
    include /home/masuda/Documents/common/shared/nginx/sparql.conf;
    include /home/masuda/Documents/common/shared/nginx/smoke-test.conf;

    location / {
        proxy_pass http://orbital_mechanics_app;
        proxy_http_version 1.1;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://orbital_mechanics_app;
        proxy_cache_valid 200 1d;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/orbital-mechanics.akylabo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orbital-mechanics.akylabo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = orbital-mechanics.akylabo.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name orbital-mechanics.akylabo.com;
    return 404;
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="#0a0a20" stroke="#3b82f6" stroke-width="2"/>
  <!-- Earth -->
  <circle cx="50" cy="50" r="12" fill="#2563eb" stroke="#60a5fa" stroke-width="1"/>
  <!-- Orbit 1 -->
  <ellipse cx="50" cy="50" rx="30" ry="20" fill="none" stroke="#22c55e" stroke-width="1" stroke-dasharray="3 3" transform="rotate(-20,50,50)"/>
  <!-- Orbit 2 -->
  <ellipse cx="50" cy="50" rx="35" ry="25" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="3 3" transform="rotate(10,50,50)"/>
  <!-- Chaser -->
  <rect x="27" y="33" width="5" height="3" rx="1" fill="#22c55e" transform="rotate(-20,29.5,34.5)"/>
  <!-- Target -->
  <rect x="73" y="30" width="6" height="4" rx="1" fill="#f97316" transform="rotate(10,76,32)"/>
  <!-- Docking port indicator -->
  <circle cx="76" cy="32" r="1.5" fill="#fff"/>
</svg>

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    # Defense in depth: dot-files (.env*, .git/, etc) を絶対公開しない
    location ~ /\. {
        deny all;
        return 403;
    }

    location / { try_files $uri $uri/ /index.html; }
    location = /api/smoke-test {
        default_type application/json;
        return 200 '{"status":"ok","checks":[{"name":"frontend","status":"ok"}]}';
    }
}

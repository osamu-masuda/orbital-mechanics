services:
  app:
    container_name: orbital-mechanics
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-5820}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  api:
    container_name: orbital-mechanics-api
    build:
      context: ./backend
    ports:
      - "${HOST_BIND:-127.0.0.1}:${API_PORT:-5821}:8000"
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  api-data:

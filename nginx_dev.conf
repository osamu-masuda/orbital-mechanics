# orbital-mechanics - fatty6 nginx 中間レイヤー (SSL なし)
# fatty4 nginx (SSL終端) → 192.168.11.6:15820 → ここ → 127.0.0.1:5820
# 移行日: 2026-04-11

upstream orbital_mechanics_app { server 127.0.0.1:5820; }
upstream orbital_mechanics_api { server 127.0.0.1:5821; }
server {
    server_name orbital-mechanics.akylabo.com;
    access_log /var/log/nginx/orbital-mechanics_access.log;
    error_log /var/log/nginx/orbital-mechanics_error.log;

    # Flight Recorder API
    location /api/simulate {
        proxy_pass http://orbital_mechanics_api;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
        proxy_read_timeout 120s;
    }
    location /api/flight-log {
        proxy_pass http://orbital_mechanics_api;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
    }
    location /api/flight-logs {
        proxy_pass http://orbital_mechanics_api;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
    }
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
    include /home/masuda/Documents/common/shared/nginx/sparql.conf;
    include /home/masuda/Documents/common/shared/nginx/smoke-test.conf;

    location / {
        proxy_pass http://orbital_mechanics_app;
        proxy_http_version 1.1;
        include /home/masuda/Documents/common/shared/nginx/common-headers.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://orbital_mechanics_app;
        proxy_cache_valid 200 1d;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 15820;
}


# API バックエンド直結（site-top ヘルスチェック用）
server {
    listen 15821;
    server_name orbital-mechanics.akylabo.com _;
    access_log off;
    location / {
        proxy_pass http://127.0.0.1:5821;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
